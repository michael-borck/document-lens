appId: com.documentlens.app
productName: Document Lens
copyright: Copyright © 2024 Michael Borck

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - node_modules/better-sqlite3/**/*

# Use prebuilt binaries instead of rebuilding from source
# This avoids issues with Python/node-gyp on newer Python versions
npmRebuild: true
buildDependenciesFromSource: false

asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*

# Bundle the Python backend executable
extraResources:
  - from: backend/
    to: backend
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  # Explicitly disable electron-builder's built-in notarize wrapper —
  # it has been buggy across 24.x and crashes with `Cannot destructure
  # property 'appBundleId' of 'options'` whenever APPLE_* env vars are
  # present (which they are, in CI). When we wire real notarization,
  # we'll do it via an afterSign hook calling @electron/notarize
  # directly. For now, beta DMGs are unsigned — researchers right-click-
  # Open the .app once and macOS remembers the trust decision.
  notarize: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: resources/icon.png
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: michaelborck-education
  repo: document-lens
