name: CI

# Fast quality gate — runs on every push to main and every PR. Separate from
# build.yml (which builds/signs the 3-platform installers on tags): this one
# gates correctness (lint + typecheck + tests) and reports coverage.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit + invariant tests, lint, typecheck, coverage ───────────────────
  test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22' # tests use node:sqlite (needs Node 22+)
          cache: npm

      # Full install: esbuild (used by vite/vitest) needs its postinstall to
      # fetch its platform binary, so --ignore-scripts isn't safe here.
      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test + coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # ── Backend-free e2e smoke (boots the built app, creates a project) ──────
  e2e-smoke:
    name: E2E smoke (no backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      # Full install here — the e2e suite launches the real Electron binary.
      - name: Install
        run: npm ci

      # System libraries Electron/Chromium need on a headless Linux runner.
      - name: Install OS deps for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64 || \
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2

      - name: Build renderer
        run: npm run build:vite

      - name: Run smoke spec (xvfb)
        run: xvfb-run -a npx playwright test e2e/smoke.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-smoke
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Full happy-path e2e (needs the document-analyser backend) ───────────
  # Manual only (workflow_dispatch) — sets up the Python backend as a sibling
  # checkout so the dev spawner can run it, then drives import→workspace. Gates
  # on backend-ready and SKIPS if the backend can't start, so it never blocks.
  e2e-happy-path:
    name: E2E happy-path (with backend)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout app
        uses: actions/checkout@v7
        with:
          path: document-lens

      - name: Checkout backend (sibling)
        uses: actions/checkout@v7
        with:
          repository: michael-borck/document-analyser
          ref: main
          path: document-analyser

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: document-lens/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # uv creates the .venv the dev backend spawner prefers.
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install backend (with ML deps)
        working-directory: document-analyser
        run: |
          $HOME/.local/bin/uv sync --extra nlp || $HOME/.local/bin/uv sync

      - name: Install app + OS deps
        working-directory: document-lens
        run: |
          npm ci
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64 || \
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2

      - name: Build renderer
        working-directory: document-lens
        run: npm run build:vite

      - name: Run happy-path spec (xvfb)
        working-directory: document-lens
        run: xvfb-run -a npx playwright test e2e/happy-path.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-happy-path
          path: |
            document-lens/playwright-report/
            document-lens/test-results/
          retention-days: 7
