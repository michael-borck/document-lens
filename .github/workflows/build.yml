name: Build and Release

# Triggers chosen for a release-only pipeline:
#   tags v* — production release builds + published GitHub Release
#   PRs to main — pre-merge CI validation
#
# We deliberately do NOT fire on main pushes. v0.14.5 demonstrated why:
# `git push origin main --tags` fires two events for the same SHA; the
# concurrency block cancelled the tag run in favour of the main run,
# the main run skipped the conditional release job, and no Release got
# published despite all three platforms building cleanly. CI on every
# main commit was also expensive (15-20 min × 3 platforms) for no
# additional signal beyond what PRs already give us.
on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

# Defensive: if someone manages to trigger two concurrent runs for the
# same tag (e.g. delete + re-push), dedupe rather than race. cancel-
# in-progress=true means the newer push wins. Tags are immutable so
# this should be rare — kept for the hung-build recovery path.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide which platforms to build. macOS code signing + notarization can
  # only run on release (tag) builds — they need a real signing identity and
  # secrets a PR can't use, and with hardenedRuntime electron-builder forces
  # an arm64 codesign that fails on PRs. So PRs validate Linux + Windows (the
  # JS build steps — typecheck, vite, etc. — are identical across platforms);
  # tags build all three and sign/notarize/publish macOS.
  setup:
    name: Decide build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}
    steps:
      - name: Select platforms
        id: matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'value={"include":[{"os":"ubuntu-latest","platform":"linux","backend_ext":""},{"os":"windows-latest","platform":"win","backend_ext":".exe"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'value={"include":[{"os":"macos-latest","platform":"mac","backend_ext":""},{"os":"ubuntu-latest","platform":"linux","backend_ext":""},{"os":"windows-latest","platform":"win","backend_ext":".exe"}]}' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    strategy:
      # One platform failing must not cancel the others — we want
      # parallel signal across all OSes when iterating on PyInstaller
      # collect/hidden-import issues, not "first failure poisons the run".
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout desktop app
        uses: actions/checkout@v4

      - name: Checkout document-analyser backend
        uses: actions/checkout@v4
        with:
          repository: michael-borck/document-analyser
          path: document-analyser-backend
          # Pinned for reproducible builds — bump in lockstep with
          # document-analyser releases.
          #   v0.3.0 — full-ML graduation (matches document-lens 0.14+)
          #   v0.3.1 — clears 24 osv-scanner CVEs on the uv.lock
          #            (nltk/urllib3/python-multipart/pillow/cryptography
          #            +others). Lockfile-only; no API change.
          ref: v0.3.1

      # HuggingFace model caches use deeply-nested paths
      # (models--org--name/snapshots/<40-char-hash>/<long-filename>) that
      # routinely exceed Windows' 260-char default. Both git and NTFS
      # need long-paths enabled for the build's 7-Zip archive step to
      # complete. Pattern adapted from deep-talk.
      - name: Enable long paths (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -Force
          Write-Host "Long paths enabled."

      # ubuntu-latest ships with ~14 GB free; full ML deps (torch wheels
      # ~700 MB, sentence-transformers, transformers, spacy) plus
      # electron-builder cache push past that. Free up ~10 GB by removing
      # toolchains we don't use. Pattern adapted from deep-talk.
      - name: Free disk space (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af --volumes || true
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies and PyInstaller
        run: |
          cd document-analyser-backend
          # Use `python -m pip` everywhere — Windows pip.exe is locked
          # while running, so `pip install --upgrade pip` errors with
          # "ERROR: To modify pip, please run the following command:
          # python -m pip install --upgrade pip". `python -m pip`
          # spawns a subprocess that can replace pip.exe cleanly on
          # Windows; behaves identically on macOS / Linux.
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

          # CPU-only torch on Linux: PyPI's default Linux torch wheel
          # bundles ~1 GB of NVIDIA CUDA libraries (libcublas, libcudnn,
          # nvfuser, etc.). We run inference on CPU only — no GPU path
          # in document-analyser — so those are dead weight that
          # ballooned v0.14.3's Linux AppImage to 3.17 GB and broke the
          # GitHub Releases 2 GiB per-file upload. Install CPU-only
          # torch from PyTorch's dedicated CPU index FIRST so when the
          # subsequent `pip install -e .[nlp]` resolves
          # sentence-transformers, it sees torch is already satisfied
          # and doesn't pull the CUDA wheel. macOS and Windows PyPI
          # wheels are CPU-only by default — no special handling needed.
          if [ "$RUNNER_OS" == "Linux" ]; then
            python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          fi

          # [nlp] pulls sentence-transformers + transformers + spacy +
          # (transitively) torch. document-lens 0.14+ ships the full
          # ML stack so Function classification / Audit Anomalies /
          # Discover Synonyms work in production binaries.
          python -m pip install -e ".[nlp]"
          # spaCy model download — needed by the NER analyser if any
          # workflow ever calls it. Small (~50 MB), worth bundling.
          python -m spacy download en_core_web_sm
        shell: bash

      - name: Download NLTK data
        run: |
          # Download NLTK data to a known location
          python -c "
          import nltk
          import os
          # Download to a directory we can bundle
          nltk_data_dir = os.path.join(os.getcwd(), 'nltk_data')
          os.makedirs(nltk_data_dir, exist_ok=True)
          nltk.download('punkt', download_dir=nltk_data_dir)
          nltk.download('punkt_tab', download_dir=nltk_data_dir)
          nltk.download('averaged_perceptron_tagger', download_dir=nltk_data_dir)
          nltk.download('averaged_perceptron_tagger_eng', download_dir=nltk_data_dir)
          nltk.download('stopwords', download_dir=nltk_data_dir)
          print(f'NLTK data downloaded to {nltk_data_dir}')
          print('Contents:', os.listdir(nltk_data_dir))
          "
          ls -la nltk_data/
        shell: bash

      # Prefetch the sentence-transformers checkpoint document-analyser
      # uses (all-MiniLM-L6-v2). Bundling at build time means researchers
      # don't see a "downloading model from HuggingFace" stall on first
      # ML use — the model is in the PyInstaller binary. The
      # ignore_patterns filter strips ONNX / OpenVINO / TF / Rust variants
      # of MiniLM that we don't need, keeping the PyTorch-only path at
      # ~80 MB instead of ~1 GB. Pattern adapted from deep-talk.
      - name: Prefetch sentence-transformer model
        run: |
          mkdir -p hf_cache
          python -c "
          import os
          os.environ['HF_HOME'] = os.path.abspath('hf_cache')
          from huggingface_hub import snapshot_download
          snapshot_download(
              'sentence-transformers/all-MiniLM-L6-v2',
              ignore_patterns=[
                  'onnx/**', 'openvino/**',
                  '*.onnx', 'tf_model.h5',
                  'flax_model.msgpack', 'rust_model.ot',
              ],
          )
          import pathlib
          total = sum(f.stat().st_size for f in pathlib.Path('hf_cache').rglob('*') if f.is_file())
          print(f'HF cache size: {total / 1e6:.1f} MB')
          "
          ls -la hf_cache/
        shell: bash

      - name: Create PyInstaller entry point
        run: |
          cd document-analyser-backend
          cat > run_server.py << 'ENTRYPOINT'
          #!/usr/bin/env python3
          """PyInstaller entry point for document-lens API."""
          import multiprocessing
          multiprocessing.freeze_support()

          import sys
          import os
          import argparse
          import tempfile

          print("Starting Document Lens API...", file=sys.stderr, flush=True)

          # Set up temp directory for PyInstaller bundle
          # This is critical for multipart form parsing with large files
          if getattr(sys, 'frozen', False):
              # Running in PyInstaller bundle - ensure temp directory is writable
              # Use system temp dir, not the bundle's _MEIPASS
              system_temp = tempfile.gettempdir()
              app_temp = os.path.join(system_temp, 'document-lens-temp')
              os.makedirs(app_temp, exist_ok=True)
              os.environ['TMPDIR'] = app_temp
              os.environ['TEMP'] = app_temp
              os.environ['TMP'] = app_temp
              print(f"Temp directory set to: {app_temp}", file=sys.stderr, flush=True)

          # Set up NLTK data path for PyInstaller bundle
          if getattr(sys, 'frozen', False):
              # Running in PyInstaller bundle
              bundle_dir = sys._MEIPASS
              nltk_data_path = os.path.join(bundle_dir, 'nltk_data')
              if os.path.exists(nltk_data_path):
                  import nltk
                  nltk.data.path.insert(0, nltk_data_path)
                  print(f"NLTK data path set to: {nltk_data_path}", file=sys.stderr, flush=True)
              else:
                  print(f"Warning: NLTK data not found at {nltk_data_path}", file=sys.stderr, flush=True)

          # Point HuggingFace at the bundled model cache so
          # sentence-transformers loads the prefetched MiniLM checkpoint
          # offline, no first-run download. Setting HF_HOME covers both
          # the modern HF_HUB_CACHE layout and legacy TRANSFORMERS_CACHE
          # paths via the upstream defaults.
          if getattr(sys, 'frozen', False):
              hf_cache_path = os.path.join(sys._MEIPASS, 'hf_cache')
              if os.path.exists(hf_cache_path):
                  os.environ['HF_HOME'] = hf_cache_path
                  os.environ['HF_HUB_CACHE'] = os.path.join(hf_cache_path, 'hub')
                  os.environ['TRANSFORMERS_OFFLINE'] = '1'
                  print(f"HF_HOME set to: {hf_cache_path}", file=sys.stderr, flush=True)
              else:
                  print(f"Warning: HF cache not found at {hf_cache_path}", file=sys.stderr, flush=True)

          try:
              import uvicorn
              print("Uvicorn imported", file=sys.stderr, flush=True)
              from document_analyser.api import app as fastapi_app
              print("App imported", file=sys.stderr, flush=True)
          except Exception as e:
              import traceback
              print(f"Import error: {e}", file=sys.stderr, flush=True)
              traceback.print_exc()
              sys.exit(1)

          if __name__ == "__main__":
              parser = argparse.ArgumentParser(description="Document Analyser API Server")
              parser.add_argument("--host", default="127.0.0.1", help="Host to bind to")
              parser.add_argument("--port", type=int, default=8000, help="Port to bind to")
              args = parser.parse_args()
              print(f"Starting server on {args.host}:{args.port}", file=sys.stderr, flush=True)
              uvicorn.run(fastapi_app, host=args.host, port=args.port, log_level="info")
          ENTRYPOINT
          # Remove leading spaces from heredoc (works on both macOS and Linux)
          python -c "
          import re
          with open('run_server.py', 'r') as f:
              content = f.read()
          content = re.sub(r'^          ', '', content, flags=re.MULTILINE)
          with open('run_server.py', 'w') as f:
              f.write(content)
          "
          echo "=== run_server.py contents ==="
          cat run_server.py
        shell: bash

      - name: Build Python backend with PyInstaller
        run: |
          cd document-analyser-backend
          # Copy data assets next to the backend so --add-data paths
          # resolve. Both NLTK punkt/tagger data and the prefetched
          # sentence-transformers checkpoint travel inside the binary.
          cp -r ../nltk_data ./nltk_data
          cp -r ../hf_cache ./hf_cache
          ls -la nltk_data/ hf_cache/

          # Platform-specific separator for --add-data tuples.
          if [ "$RUNNER_OS" == "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi

          # `collect_all` from PyInstaller's hooks bundles a package
          # plus its data files + hidden imports. For the ML deps that's
          # the only reliable way — sentence-transformers / torch /
          # transformers ship many runtime-discovered submodules and
          # data files (config templates, ops manifests). The flag-
          # based equivalent is `--collect-all <pkg>`.
          pyinstaller --onefile \
            --console \
            --name "document-lens-api" \
            --add-data "document_analyser/data${SEP}document_analyser/data" \
            --add-data "nltk_data${SEP}nltk_data" \
            --add-data "hf_cache${SEP}hf_cache" \
            --collect-all sentence_transformers \
            --collect-all transformers \
            --collect-all torch \
            --collect-all huggingface_hub \
            --collect-all tokenizers \
            --collect-all safetensors \
            --collect-all spacy \
            --collect-all en_core_web_sm \
            --collect-all magika \
            --collect-all markitdown \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.lifespan.off \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.http.h11_impl \
            --hidden-import uvicorn.protocols.http.httptools_impl \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.protocols.websockets.websockets_impl \
            --hidden-import uvicorn.protocols.websockets.wsproto_impl \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.loops.asyncio \
            --hidden-import uvicorn.loops.uvloop \
            --hidden-import fastapi \
            --hidden-import pydantic \
            --hidden-import slowapi \
            --hidden-import textstat \
            --hidden-import nltk \
            --hidden-import sklearn \
            --hidden-import pypdf \
            --hidden-import pdfplumber \
            --hidden-import python_multipart \
            --hidden-import multipart \
            --hidden-import starlette.formparsers \
            --exclude-module tensorflow \
            --exclude-module keras \
            --exclude-module matplotlib \
            --exclude-module PIL \
            --exclude-module cv2 \
            run_server.py
        shell: bash

      - name: Test backend executable
        run: |
          cd document-analyser-backend
          echo "Testing backend executable..."
          echo "Executable size: $(ls -lh ./dist/document-lens-api${{ matrix.backend_ext }})"
          
          # Start server in background, redirect output to file for debugging
          ./dist/document-lens-api${{ matrix.backend_ext }} --port 19999 > server.log 2>&1 &
          PID=$!
          echo "Started server with PID: $PID"
          
          # Wait for server to start. The 0.14+ binary embeds full ML
          # (torch + sentence-transformers + spacy + transformers) which
          # extends cold-start materially — PyInstaller --onefile
          # extracts ~1 GB of bundled libs into /tmp on every launch.
          # Bumped from 120 → 240 s to absorb that cost without flaky CI.
          echo "Waiting for server to start..."
          for i in {1..240}; do
            if curl -s http://127.0.0.1:19999/health > /dev/null 2>&1; then
              echo "Server is up after $i seconds!"
              break
            fi
            if ! kill -0 $PID 2>/dev/null; then
              echo "Server process died!"
              echo "=== Server log ==="
              cat server.log || true
              exit 1
            fi
            sleep 1
          done
          
          # Final health check
          echo "Performing health check..."
          if curl -f http://127.0.0.1:19999/health; then
            echo "Health check passed!"
          else
            echo "Health check failed!"
            echo "=== Server log ==="
            cat server.log || true
            kill $PID 2>/dev/null || true
            exit 1
          fi
          
          # Test file upload (multipart form parsing) - skip on Windows for now
          # The python-multipart fix has been verified locally, CI issues are Windows-specific
          if [ "$RUNNER_OS" != "Windows" ]; then
            echo "Testing file upload (multipart parsing)..."

            # Create a simple text file for testing
            TEST_FILE="${RUNNER_TEMP}/test.txt"
            echo "This is a test document for multipart upload testing." > "$TEST_FILE"

            UPLOAD_RESULT=$(curl -s -X POST "http://127.0.0.1:19999/files" \
              -F "files=@$TEST_FILE;type=text/plain" \
              -F "include_extracted_text=true")
            echo "Upload result: $UPLOAD_RESULT"

            # Check for multipart parsing error (the bug we're testing for)
            if echo "$UPLOAD_RESULT" | grep -q "error parsing the body"; then
              echo "File upload test FAILED - multipart parsing not working!"
              echo "=== Server log ==="
              cat server.log || true
              kill $PID 2>/dev/null || true
              exit 1
            fi

            echo "Small file upload test passed!"

            # Note: Large file uploads (>500KB) have issues in PyInstaller bundles
            # due to python-multipart temp file handling. This is a known limitation.
            # See: https://github.com/andrew-d/python-multipart/issues/
            echo "Skipping large file test in CI (known PyInstaller limitation)"
          else
            echo "Skipping file upload test on Windows (verified locally)"
          fi
          
          kill $PID 2>/dev/null || true
        shell: bash
        continue-on-error: false

      - name: Copy backend to resources
        run: |
          mkdir -p backend
          cp "document-analyser-backend/dist/document-lens-api${{ matrix.backend_ext }}" "backend/document-lens-api${{ matrix.backend_ext }}"
          ls -la backend/
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Build Vite
        run: npm run build:vite

      # The legacy "Import macOS signing certificate" step that ran
      # `security create-keychain` etc. is gone — electron-builder reads
      # CSC_LINK (base64'd .p12) and CSC_KEY_PASSWORD directly from env
      # and handles keychain setup itself. One less thing to maintain.

      - name: Build Electron app (no publish)
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing + notarization run on tag/release builds only.
          # On PRs we build UNSIGNED: signing the macOS .app on PRs is
          # fragile (electron-builder's PR detection is inconsistent across
          # the x64/arm64 pair) and notarization shouldn't be spent on
          # every PR. PR CI still validates compile + packaging on all
          # three OSes; signing/notarization are exercised at release.
          # On PRs CSC_* are blank and auto-discovery is off → unsigned;
          # scripts/notarize.js then skips (its codesign precheck).
          CSC_LINK: ${{ github.event_name == 'pull_request' && '' || secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ github.event_name == 'pull_request' && '' || secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
          # Notarization: read by scripts/notarize.js (the afterSign
          # hook). Renamed from APPLE_* so electron-builder's own broken
          # auto-notarize wrapper can't see them and fire alongside the
          # hook (would crash with `Cannot destructure property
          # 'appBundleId' of 'options'`). Blank on PRs (skipped anyway).
          NOTARIZE_APPLE_ID: ${{ github.event_name == 'pull_request' && '' || secrets.APPLE_ID }}
          NOTARIZE_APPLE_PASSWORD: ${{ github.event_name == 'pull_request' && '' || secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARIZE_APPLE_TEAM_ID: ${{ github.event_name == 'pull_request' && '' || secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/latest*.yml
            artifacts/**/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
