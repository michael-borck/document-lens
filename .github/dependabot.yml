# Dependabot version-update PRs. (Security *alerts* are a repo Settings toggle,
# on by default for public repos — this file adds automated dependency-bump PRs.)
version: 2
updates:
  # npm dependencies (the Electron/React app).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk dev-tooling bumps into one PR to cut noise.
      dev-dependencies:
        dependency-type: development
    ignore:
      # Electron major bumps are a coordinated, manual effort (native modules,
      # notarisation, packaging) — don't let Dependabot open churn PRs for them.
      - dependency-name: electron
        update-types: [version-update:semver-major]
      # The Vite / Vitest / ESLint toolchain moves together (plugin-react 6 wants
      # vite 8, vitest 4 drops environmentMatchGlobs, eslint 10 shifts the
      # flat-config generation). Upgrade these deliberately as one coordinated PR,
      # not via automated major bumps — minor/patch updates still flow.
      - dependency-name: vite
        update-types: [version-update:semver-major]
      - dependency-name: "@vitejs/plugin-react"
        update-types: [version-update:semver-major]
      - dependency-name: vite-plugin-electron
        update-types: [version-update:semver-major]
      - dependency-name: vite-plugin-electron-renderer
        update-types: [version-update:semver-major]
      - dependency-name: vitest
        update-types: [version-update:semver-major]
      - dependency-name: "@vitest/coverage-v8"
        update-types: [version-update:semver-major]
      - dependency-name: eslint
        update-types: [version-update:semver-major]
      - dependency-name: "@eslint/js"
        update-types: [version-update:semver-major]
      # Core framework / runtime majors are deliberate migrations (React 19,
      # Tailwind 4's new engine, the TypeScript 7 native compiler, recharts 3,
      # visx 4) — Dependabot keeps minor/patch (+ security) flowing but leaves
      # these for scheduled, hands-on upgrades instead of churn PRs.
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: "@types/react"
        update-types: [version-update:semver-major]
      - dependency-name: "@types/react-dom"
        update-types: [version-update:semver-major]
      - dependency-name: tailwindcss
        update-types: [version-update:semver-major]
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: recharts
        update-types: [version-update:semver-major]
      - dependency-name: "@visx/*"
        update-types: [version-update:semver-major]

  # Keep the GitHub Actions used by the workflows current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
